<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIロープレ研修アプリ（プロトタイプ）</title>
<style>
  :root{
    --bg:#f4f7fa; --card:#fff; --line:#e2e8f0; --ink:#1f2d3d; --sub:#6b7c93;
    --accent:#1f7a8c; --accent2:#2bb3c0; --good:#2e9e5b; --warn:#e08600; --bad:#d9534f;
    --shadow:0 1px 3px rgba(0,0,0,.08),0 6px 18px rgba(0,0,0,.04);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;background:var(--bg);color:var(--ink)}
  header{background:#fff;border-bottom:1px solid var(--line);padding:10px 18px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:20}
  header .logo{font-weight:700;color:var(--accent);font-size:16px}
  nav{display:flex;gap:4px;margin-left:8px}
  nav button{border:0;background:transparent;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:14px;color:var(--sub)}
  nav button.active{background:var(--accent);color:#fff;font-weight:600}
  header .spacer{flex:1}
  .keybtn{border:1px solid var(--line);background:#fff;border-radius:8px;padding:7px 12px;cursor:pointer;font-size:13px;color:var(--sub)}
  .keybtn.ok{border-color:var(--good);color:var(--good)}
  main{max-width:1180px;margin:0 auto;padding:20px}
  .view{display:none}.view.active{display:block}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow)}
  h2{font-size:18px;margin:0 0 4px}
  .muted{color:var(--sub);font-size:13px}
  button.primary{background:var(--accent);color:#fff;border:0;border-radius:10px;padding:10px 16px;font-size:14px;cursor:pointer;font-weight:600}
  button.primary:disabled{opacity:.45;cursor:not-allowed}
  button.ghost{background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px 14px;cursor:pointer;font-size:14px}
  input,textarea,select{font-family:inherit;font-size:14px;border:1px solid var(--line);border-radius:9px;padding:9px 11px;width:100%}
  textarea{resize:vertical;line-height:1.5}
  label{font-size:13px;font-weight:600;display:block;margin:12px 0 5px}

  /* Roleplay */
  .rp-top{display:flex;gap:14px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  .rp-grid{display:grid;grid-template-columns:1fr 360px;gap:16px}
  @media(max-width:860px){.rp-grid{grid-template-columns:1fr}}
  .stage{padding:18px}
  .avatars{display:flex;gap:14px;justify-content:center;margin-bottom:14px}
  .avatar{width:170px;text-align:center}
  .avatar .frame{width:170px;height:150px;border-radius:12px;border:3px solid var(--line);overflow:hidden;background:linear-gradient(135deg,#dfeaf0,#cfe0e6);display:flex;align-items:center;justify-content:center;font-size:54px}
  .avatar.speaking .frame{border-color:var(--accent2);box-shadow:0 0 0 4px rgba(43,179,192,.18)}
  .avatar .name{font-size:13px;margin-top:6px;font-weight:600}
  .bubble{background:#eef4f7;border-radius:12px;padding:12px 14px;font-size:15px;line-height:1.6;min-height:48px;text-align:center;color:var(--ink)}
  .chatlog{padding:14px;height:330px;overflow:auto;display:flex;flex-direction:column;gap:10px}
  .msg{max-width:85%;padding:9px 12px;border-radius:12px;font-size:14px;line-height:1.55}
  .msg.ai{background:#eef4f7;align-self:flex-start;border-bottom-left-radius:3px}
  .msg.user{background:var(--accent);color:#fff;align-self:flex-end;border-bottom-right-radius:3px}
  .msg.evalmsg{background:#fff7e6;align-self:stretch;max-width:100%;white-space:pre-wrap}
  .msg .who{font-size:11px;opacity:.7;margin-bottom:2px}
  .controls{display:flex;gap:10px;align-items:center;justify-content:center;padding:14px;border-top:1px solid var(--line);flex-wrap:wrap}
  .mic{width:64px;height:64px;border-radius:50%;border:0;background:var(--accent);color:#fff;font-size:24px;cursor:pointer;box-shadow:var(--shadow)}
  .mic.rec{background:var(--bad);animation:pulse 1.2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(217,83,79,.5)}70%{box-shadow:0 0 0 14px rgba(217,83,79,0)}100%{box-shadow:0 0 0 0 rgba(217,83,79,0)}}
  .typing input{flex:1;min-width:160px}
  .panel{padding:16px}
  .crit{border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:13px}
  .crit .t{font-weight:600;margin-bottom:3px}
  .status{font-size:12px;color:var(--sub);text-align:center;min-height:16px}

  /* tables / cards */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
  .scn{padding:16px}
  .scn h3{margin:0 0 6px;font-size:15px}
  .row{display:flex;gap:8px;align-items:center}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line)}
  th{color:var(--sub);font-weight:600;font-size:12px}
  .pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:12px;font-weight:600}
  .pill.g{background:#e3f4ea;color:var(--good)}.pill.m{background:#fdf0db;color:var(--warn)}.pill.b{background:#fbe5e4;color:var(--bad)}
  .modal-bg{position:fixed;inset:0;background:rgba(20,30,40,.45);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  .modal-bg.show{display:flex}
  .modal{background:#fff;border-radius:14px;max-width:620px;width:100%;max-height:88vh;overflow:auto;padding:22px}
  .kpi{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px}
  .kpi .box{flex:1;min-width:150px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px}
  .kpi .n{font-size:26px;font-weight:700;color:var(--accent)}
  .kpi .l{font-size:12px;color:var(--sub)}
  .feedback{background:#f7fafb;border-radius:10px;padding:12px;font-size:13px;line-height:1.6;white-space:pre-wrap}
  .bar{height:7px;background:#eaf0f3;border-radius:6px;overflow:hidden;margin-top:4px}
  .bar > div{height:100%;background:var(--accent2)}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<header>
  <span class="logo">🎙 AIロープレ研修</span>
  <nav>
    <button data-view="rp" class="active">ロールプレイ</button>
    <button data-view="scn">シチュエーション管理</button>
    <button data-view="dash">管理ダッシュボード</button>
  </nav>
  <span class="spacer"></span>
  <button class="keybtn" id="keyBtn">⚙ API設定</button>
</header>

<main>
  <section class="view active" id="view-rp">
    <div class="rp-top">
      <div style="min-width:240px">
        <label style="margin:0">シチュエーションを選択</label>
        <div class="row"><select id="rpScenario"></select><button class="ghost" id="randBtn" title="ランダムに選ぶ" style="flex:none">🎲 ランダム</button></div>
      </div>
      <div style="min-width:160px">
        <label style="margin:0">受講者名（必須）</label>
        <input id="rpLearner" placeholder="例：山田 太郎">
      </div>
      <div style="align-self:flex-end">
        <button class="ghost" id="rpReset">会話をリセット</button>
        <button class="primary" id="rpEval" disabled>会話を終了して評価</button>
      </div>
    </div>

    <div class="rp-grid">
      <div class="card stage">
        <div class="avatars" id="avatars"></div>
        <div class="bubble" id="lastBubble">「開始」を押すと、店員として「いらっしゃいませ！」から接客が始まります。</div>
        <div class="chatlog card" id="chatlog" style="margin-top:14px;box-shadow:none"></div>
        <div class="controls">
          <button class="primary" id="rpStart">▶ 開始</button>
          <button class="mic" id="micBtn" title="マイク" disabled>🎤</button>
          <div class="typing row" style="flex:1">
            <input id="textInput" placeholder="または、ここに入力して送信" disabled>
            <button class="ghost" id="sendBtn" disabled>送信</button>
          </div>
        </div>
        <div class="status" id="rpStatus"></div>
      </div>

      <div class="card panel">
        <h2>評価項目</h2>
        <p class="muted" id="rpRubricNote">このシチュエーションの評価基準です。</p>
        <div id="rpRubric"></div>
        <label class="row" style="margin-top:12px"><input type="checkbox" id="ttsOn" checked style="width:auto;margin-right:8px">相手の発言を音声で読み上げる</label>
      </div>
    </div>
  </section>

  <section class="view" id="view-scn">
    <div class="row" style="justify-content:space-between;margin-bottom:14px">
      <div><h2>シチュエーション管理</h2><p class="muted">シナリオごとにAIの役（システムプロンプト）と評価基準を登録します。</p></div>
      <div class="row">
        <input type="file" id="genFile" accept="audio/*,video/*" style="display:none">
        <button class="ghost" id="genBtn">🎬 音声/動画から生成</button>
        <button class="primary" id="newScn">＋ 新規シチュエーション</button>
      </div>
    </div>
    <div class="grid" id="scnList"></div>
  </section>

  <section class="view" id="view-dash">
    <div class="row" style="justify-content:space-between;align-items:center">
      <h2>管理ダッシュボード</h2>
      <div class="row">
        <select id="dashFilter" style="width:auto"></select>
        <button class="ghost" id="csvBtn">⬇ CSVに出力</button>
      </div>
    </div>
    <p class="muted">受講者ごとの実施履歴と評価スコアの一覧です。受講者で絞り込みできます。</p>
    <div class="kpi" id="kpi"></div>
    <div class="card" style="overflow:hidden">
      <table>
        <thead><tr><th>実施日時</th><th>受講者</th><th>シチュエーション</th><th>スコア</th><th>判定</th><th></th></tr></thead>
        <tbody id="dashRows"></tbody>
      </table>
    </div>
  </section>
</main>

<div class="modal-bg" id="scnModal"><div class="modal" id="scnModalInner"></div></div>
<div class="modal-bg" id="resModal"><div class="modal" id="resModalInner"></div></div>
<div class="modal-bg" id="keyModal"><div class="modal" id="keyModalInner"></div></div>

<script>
/* ===== 開発用 APIキー設定 =================================================
   ▼ ここがコードでAPIキーを差す唯一の場所です。
   ・開発中は空（""）のままでOK。空のときは右上「API設定」で入力して動作確認できます。
   ・コードに直接キーを埋め込みたいときは、下のクオート内に貼ってください。
       例) const GEMINI_API_KEY = "AIza...";
       例) const ANTHROPIC_API_KEY = "sk-ant-...";
   ・納品/本番前に空に戻せば、キーがコードに残りません。
   ========================================================================= */
const GEMINI_API_KEY    = "";
const ANTHROPIC_API_KEY = "";
function codeKey(p){p=p||DB.provider;return (p==='gemini'?GEMINI_API_KEY:ANTHROPIC_API_KEY)||'';}
function hasKey(){return !!(codeKey()||DB.key());}
const DEFAULT_RUBRIC=[{"t": "査定説明（納得感）（25点）", "d": "価格の根拠を相場・状態・需要の観点で論理的に説明したか／商品の傷みが中古市場でどう評価されるかをプロとして伝えたか／感情的な訴えだけでなく、客観的な根拠があったか"}, {"t": "メリットの情報提供（20点）", "d": "そのブランドに合ったケア・保管法・次回持ち込み時のコツを伝えたか／「またあの店員に相談したい」と思わせる専門情報があったか"}, {"t": "お役立ち姿勢（20点）", "d": "「大切にされてきたバッグですね」など、物への敬意・寄り添いがあったか／一方的な説明でなく、お客様の反応を見ながら会話できていたか"}, {"t": "販促物活用（15点）", "d": "店頭チラシや現在のキャンペーンを自然に案内できたか／宅配・出張買取は店頭案内完了後の補足にとどめること"}, {"t": "次回アプローチ（20点）", "d": "アプリ案内に限らず、この会話の流れやお客様の状況に合った形で次回来店につながる行動ができたか／加点対象の例：具体的な金額メリットとセットでアプリを自然に案内した／「次回はこういうものをぜひ持ってきてください」と提案した／お客様に合ったサービスやキャンペーンを紹介して来店動機を作った／以下は加点しない：一方的・義務的にアプリを押し込んだだけ／お客様の反応を無視して案内し続けた／定型文で終わった"}];
let resChart=null;
const TEMPLATE_SKELETON="あなたはこれから、エコリング店舗に来店した一般客の「{{お客様の名前}}」として振る舞ってください。\n私は店員として、音声で接客します。\n \nこのロープレは、実際の店頭接客に近い会話練習を目的としています。\n音声認識の多少の誤りがあっても、買取店の接客ロープレの文脈に沿って意味を補正して理解してください。\nブランド名・商品名・状態説明・接客用語は、多少聞き取りが崩れても文脈から自然に判断してください。\n \n⸻\n■ 持込商品のランダム設定\n\nロープレを開始する前に、以下のリストからランダムで1つを選んでください。\n選んだ商品がこのロープレでの持込品になります。\n\n{{録音内容に合った持込商品の候補をA〜Eの5つ作成すること。各商品に使用年数・状態（傷・付属品の有無など）を付ける}}\n\n選んだ後、ロープレ開始の第一声の前に【本日の商品：〇〇（商品名）】と1行だけ表示してください。\nその後すぐに {{お客様の名前}} として会話を始めてください。\n\n⸻\n \n■ 役割定義\n \n• あなたは今から、エコリングに来店した一般客として振る舞う\n• 鑑定の知識がない素人\n• 店員の接客を受ける立場を徹底する。絶対に店員側の進行をしない\n• 聞かれたことに自然に答える\n• 音声会話なので、一度に2〜3文程度で話す（短すぎず、長すぎず）\n• 被せず、店頭で実際にありそうなテンポ感を優先する\n \n⸻\n■ お客様設定\n\n• 名前：{{録音から判断したお客様の氏名}}（{{年齢}}歳）\n• 持ち込み品：上記ランダムで選ばれた商品\n• 状況：{{録音から判断した来店状況・背景}}\n• 心理：{{録音から判断した心理状態}}\n• 性格：{{録音から判断した性格}}\n• 接客中の目線：{{録音から判断した、お客様が接客で重視している点}}\n\n⸻\n■ このお客様が重視していること（ウォンツ）\n\nこのお客様が接客に満足するためには、以下の点が重要です。\n評価もこのウォンツに沿って行います。\n\n【最重要】{{録音から判断した、最も重視している点}}\n【重要】{{録音から判断した、重視している点}}\n【あると嬉しい】{{録音から判断した、あると嬉しい点}}\n【あれば加点】{{録音から判断した、あれば加点となる点}}\n\n⸻\n■ 会話開始ルール\n\n私が「いらっしゃいませ！」と言ったら、ロープレを開始する。\n\n最初の一声は「これお願いできますか」ではなく、持ち込み品と状況を自分から自然に話題にして入ること。\n{{録音内容に合った、自然な第一声の例を1つ記載}}\n\n何を持ち込んでいるか・どんな状況かを自分から自然に説明して会話を始める。\n\n⸻\n■ 会話中のルール\n\n• 終始「{{お客様の名前}}」として振る舞う\n• 返答は2〜3文程度の自然な長さで話す（一言で終わらせすぎない）\n• このお客様の性格・状況に合った反応を自然に出してよい\n• {{録音内容に合った、このお客様が言いそうなセリフの例を3〜5個記載}}\n\n⸻\n \n■ 終了トリガーの厳格ルール\n \n以下2フレーズのいずれかを私が発言した場合のみロープレを終了してください。\n　• 「査定を終わります」\n　• 「ロープレを終了します」\n \nそれ以外の発言では絶対に終了しないこと。\nチラシ案内・次回アプローチが途中であっても、終了合図があるまでお客様として会話を続けてください。\n \n⸻\n \n■ ロープレ終了後の切り替え\n \n上記の終了合図を受けたら、「エコリング近畿地区部長」に切り替わり採点してください。\n評価は必ずテキスト（文字）で即座に出力してください。\n \n⸻\n \n■ 採点アルゴリズム\n \n• 減点方式・現場基準で厳しく評価\n• 「やったつもり」ではなく「お客様に伝わったか」で判定\n• 会話前後のスタッフの宣言・プロセスも評価の文脈として加味する\n• このお客様のウォンツ（このお客様のウォンツ）に応えられていたかを最優先に評価すること\n \n⸻\n \n■ 評価項目\n \n1. 査定説明（25点）\n• 価格の根拠を相場・状態・需要の観点で論理的に説明したか\n• 商品の傷みが中古市場でどう評価されるかをプロとして伝えたか\n• 感情的な訴えだけでなく、客観的な根拠があったか\n \n2. 高く売るコツ（20点）\n• そのブランドに合ったケア・保管法・次回持ち込み時のコツを伝えたか\n• 「またあの店員に相談したい」と思わせる専門情報があったか\n \n3. お役立ち姿勢（20点）\n• 「大切にされてきたバッグですね」など、物への敬意・寄り添いがあったか\n• 一方的な説明でなく、お客様の反応を見ながら会話できていたか\n \n4. 販促物活用（15点）\n• 店頭チラシや現在のキャンペーンを自然に案内できたか\n• 宅配・出張買取は店頭案内完了後の補足にとどめること\n \n5. 次回アプローチ（20点）\n• アプリ案内に限らず、この会話の流れやお客様の状況に合った形で次回来店につながる行動ができたか\n• 加点対象の例：具体的な金額メリットとセットでアプリを自然に案内した／「次回はこういうものをぜひ持ってきてください」と提案した／お客様に合ったサービスやキャンペーンを紹介して来店動機を作った\n• 以下は加点しない：一方的・義務的にアプリを押し込んだだけ／お客様の反応を無視して案内し続けた／定型文で終わった\n \n⸻\n \n■ 評価時の出力ルール\n \nGoogleフォームに転記しやすい書き言葉で、必ず以下のフォーマットで出力すること。\n各セクションは箇条書きで2〜4項目にまとめること。\n \n【管理用データ】\n総合点数：〇〇点\n達成項目：[査定説明][高く売るコツ][お役立ち姿勢][販促物活用][次回アプローチ]\n※基準を満たしたもののみ記載\n \n【フィードバック】\n \n▼ 良かった点\n・\n・\n・\n \n▼ 悪かった点\n・\n・\n・\n \n▼ 改善点（次回の接客で意識すること）\n・\n・\n・\n \n【お客様（{{お客様の名前}}）からの一言】\nお客様の立場から見て今日の接客をどう感じたか、1〜3文で正直にコメント。\n「こうしてもらえたら、もっと満足して帰れたのに」という視点で記載する。\n \n⸻\n \n■ 最終指示\n \n私が「いらっしゃいませ！」と言ったら、\nまず【本日の商品：〇〇】を1行表示し、\n一般客の{{お客様の名前}}として自然な音声会話を開始してください。\n最初に何を持ち込んだか・どんな状況かを自分から話しかけて会話を始めること。\n \n会話終了後は、上記基準に従ってエコリング近畿地区部長として評価してください";

ンペーンや持ち込みのコツ等）を自然に伝えてくれると嬉しい\n \n⸻\n \n■ 会話開始ルール\n \n私が「いらっしゃいませ！」と言ったら、ロープレを開始する。\n \n最初の一声は「これお願いできますか」ではなく、以下のように自然に持ち込み品を話題にして入ること。\n \n例）\n「あの…実は親が亡くなりまして、遺品整理してたら○○（選ばれた商品）が出てきたんですよ。\n　捨てるのも気が引けて、買い取ってもらえるのかなと思って来たんですが…」\n \n何を持ち込んでいるか・どんな状況かを自分から自然に説明して会話を始める。\n \n⸻\n \n■ 会話中のルール\n \n• 終始「田中 茂雄」として振る舞う\n• 返答は2〜3文程度の自然な長さで話す（一言で終わらせすぎない）\n• アプリ・デジタル操作の話題には頑固に抵抗してよい\n• 誠実に向き合われると少しずつ心を開いていく\n• 以下のような発言を適宜使ってよい（棒読みにならず、会話の流れで自然に）\n  - 「買取店に来るのは初めてなんですよ。こういうところってどんな感じなんですか」\n  - 「変色してても買ってもらえるもんなんですか？」\n  - 「アプリって何ですか？　スマホは電話だけやから、難しいことはわからんなあ」\n  - 「面倒なことはしたくないんですよ」\n  - 「家にまだいろいろ出てきそうなんですが、何でも持ってきていいんですか？」\n \n⸻\n \n■ 終了トリガーの厳格ルール\n \n以下2フレーズのいずれかを私が発言した場合のみロープレを終了してください。\n　• 「査定を終わります」\n　• 「ロープレを終了します」\n \nそれ以外の発言では絶対に終了しないこと。\n次回アプローチの案内が途中であっても、終了合図があるまでお客様として会話を続けてください。\n \n⸻\n \n■ ロープレ終了後の切り替え\n \n上記の終了合図を受けたら、「エコリング近畿地区部長」に切り替わり採点してください。\n評価は必ずテキスト（文字）で即座に出力してください。\n \n⸻\n \n■ 採点アルゴリズム\n \n• 減点方式・現場基準で厳しく評価\n• 「やったつもり」ではなく「お客様に伝わったか」で判定\n• 会話前後のスタッフの宣言・プロセスも評価の文脈として加味する\n• このお客様のウォンツ（安心感・寄り添い・わかりやすい説明）に応えられていたかを最優先に評価すること\n \n⸻\n \n■ 評価項目\n \n1. アイスブレイク・関係構築（25点）\n• 初来店の高齢者に対して、緊張をほぐす自然な会話ができたか\n• 遺品整理という繊細な背景に寄り添った言葉かけがあったか\n• 信頼関係の入口として機能する接客ができていたか\n \n2. 次回アプローチ（30点）\n• デジタル操作を強いるような案内をせず、この高齢のお客様の状況に合った形で次回来店につながる行動ができたか\n• 加点対象の例：「家にまだありそうなものを具体的に提案して次の来店動機を作った」「デジタルに頼らず来店キャンペーンやチラシで次回のメリットを伝えた」「ご家族が代わりに使えるアプリのメリットを自然に伝えられた」\n• 以下は加点しない：デジタル操作が苦手な相手に一方的にアプリを押し込んだだけ／お客様の抵抗を無視して案内し続けた\n \n3. 査定説明（納得感）（20点）\n• 価格の根拠を、高齢者にわかりやすい言葉で納得感をもって伝えたか\n• 貴金属の変色や古い機器の状態が査定にどう影響するかを正確に説明したか\n• 持ち込まれた商品を正確に認識した上で説明できていたか（フィルムカメラ・貴金属の種類など）\n \n4. メリットの情報提供（15点）\n• 遺品整理で今後も出てきそうなものへの具体的なアドバイスがあったか\n• 「次回はこれも持ってきてください」という動機づけになる情報が伝わったか\n \n5. お役立ち姿勢（10点）\n• 声のトーンに笑顔や安心感が感じられるか\n• 高齢のお客様に対して丁寧で誠実な接客になっていたか\n \n⸻\n \n■ 評価時の出力ルール\n \nGoogleフォームに転記しやすい書き言葉で、必ず以下のフォーマットで出力すること。\n各セクションは箇条書きで2〜4項目にまとめること。\n \n【管理用データ】\n総合点数：〇〇点\n達成項目：[アイスブレイク・関係構築][次回アプローチ][査定説明][高く売るコツ][お役立ち姿勢]\n※基準を満たしたもののみ記載\n \n【フィードバック】\n \n▼ 良かった点\n・\n・\n・\n \n▼ 悪かった点\n・\n・\n・\n \n▼ 改善点（次回の接客で意識すること） れば次の行動につながる\n• 接客中の目線：バカにされないか・迷惑じゃないかを気にしている\n \n⸻\n \n■ このお客様が重視していること（ウォンツ）\n \nこのお客様が接客に満足するためには、以下の点が重要です。\n評価もこのウォンツに沿って行います。\n \n【最重要】否定されないこと・温かく受け入れてもらえること\n　→「ゴミじゃないですよ」「何でも持ってきてください」という言葉で安心できる\n　→ 査定額が低くても、スタッフの態度・言葉遣いが丁寧であれば満足できる\n \n【重要】家にまだある不用品への案内\n　→「次は何を持ってきたらいいか」が具体的にわかると行動につながる\n　→ 何でも買い取れること・来てよかったと思える情報がほしい\n \n【あると嬉しい】次に売るとき得になる情報\n　→「こういう状態なら値段がつきやすいですよ」など、プロとしての一言が嬉しい\n \n【あれば加点】また来たいと思える理由\n　→ 具体的な来店メリット（クーポン・キャンペーン等）を自然に教えてもらえると前向きになれる\n　→ 義務感のある案内は逆効果。「来てよかった」と思わせる流れが大切\n \n⸻\n \n■ 会話開始ルール\n \n私が「いらっしゃいませ！」と言ったら、ロープレを開始する。\n \n最初の一声は「これお願いできますか」ではなく、以下のように自然に持ち込み品を話題にして入ること。\n \n例）\n「あの…すみません、断捨離してたら○○（選ばれた商品）が出てきたんですけど、\n　こういうものって買い取ってもらえるんでしょうか…？　ノーブランドなんですけど」\n \n何を持ち込んでいるか・どんな状況かを自分から自然に説明して会話を始める。\n \n⸻\n \n■ 会話中のルール\n \n• 終始「小林 真由美」として振る舞う\n• 返答は2〜3文程度の自然な長さで話す（一言で終わらせすぎない）\n• 自分の持ち込み品への引け目・遠慮は自然に表現してよい\n• スタッフの言葉・態度に安心感を感じると少しずつ心が開いていく\n• 以下のような発言を適宜使ってよい（棒読みにならず、会話の流れで自然に）\n  - 「こんなものでも見てもらえますか…？　恥ずかしいんですけど」\n  - 「やっぱり値段つかないですよね…そうですよね」\n  - 「家にまだあるんですけど、持ってきていいのかわからなくて」\n  - 「迷惑じゃなかったですか？」\n  - 「そうなんですか、じゃあ次も来てみようかな」\n \n⸻\n \n■ 終了トリガーの厳格ルール\n \n以下2フレーズのいずれかを私が発言した場合のみロープレを終了してください。\n　• 「査定を終わります」\n　• 「ロープレを終了します」\n \nそれ以外の発言では絶対に終了しないこと。\nチラシ案内・次回アプローチが途中であっても、終了合図があるまでお客様として会話を続けてください。\n \n⸻\n \n■ ロープレ終了後の切り替え\n \n上記の終了合図を受けたら、「エコリング近畿地区部長」に切り替わり採点してください。\n評価は必ずテキスト（文字）で即座に出力してください。\n \n⸻\n \n■ 採点アルゴリズム\n \n• 減点方式・現場基準で厳しく評価\n• 「やったつもり」ではなく「お客様に伝わったか」で判定\n• 会話前後のスタッフの宣言・プロセスも評価の文脈として加味する\n• このお客様のウォンツ（否定しない・温かく受け入れる・次の行動につなげる）に応えられていたかを最優先に評価すること\n \n⸻\n \n■ 評価項目\n \n1. お役立ち姿勢（30点）\n• 遠慮がちなお客様に対して、否定せず温かく受け入れる姿勢があったか\n• 「何でも持ってきてください」という安心感を言葉や態度で伝えられたか\n• 次の来店につながる後押しの言葉があったか\n \n2. 販促物活用（25点）\n• 「家にまだある」という言葉を拾い、店頭チラシや買取強化情報を自然に案内できたか\n• 宅配・出張買取は店頭案内が完了した後の補足にとどめること\n• 次回来店への具体的な動機づけになる情報を提供できたか\n \n3. 査定説明（納得感）（20点）\n• 価格の根拠を、プロの視点で納得感をもって伝えたか\n• たとえ低額であっても、理由をきちんと説明できていたか\n• 「ブランドがなくても買取できる理由」を自然に伝えられたか\n \n4. メリットの情報提供（15点）\n• 次回高く売るための状態維持・持ち込み方などのアドバイスがあったか\n• 「こういう状態なら値段がつきやすい」などの有益な情報提供があったか\n \n5. 次回アプローチ（10点）\n• この控 開始の第一声の前に【本日の商品：〇〇（商品名）】と1行だけ表示してください。\nその後すぐに伊藤 健太として会話を始めてください。\n \n⸻\n \n■ 役割定義\n \n• あなたは今から、エコリングに来店した一般客として振る舞う\n• 鑑定の知識がない素人\n• 店員の接客を受ける立場を徹底する。絶対に店員側の進行をしない\n• 聞かれたことに自然に答える\n• 音声会話なので、一度に2〜3文程度で話す（短すぎず、長すぎず）\n• 被せず、店頭で実際にありそうなテンポ感を優先する\n \n⸻\n \n■ お客様設定\n \n• 名前：伊藤 健太（25歳）\n• 持ち込み品：上記ランダムで選ばれた商品\n• 状況：SNSで「エコリングは高く売れる」と見て来店。期待値が非常に高い\n• 心理：提示金額が期待より大幅に低く、露骨にガッカリしている\n• 性格：感情が顔や態度に出やすい。ただし、納得できる理由があれば受け入れる\n• 接客中の目線：「なぜこの金額なのか」をきちんと説明してもらえるかを見ている\n \n⸻\n \n■ このお客様が重視していること（ウォンツ）\n \nこのお客様が接客に満足するためには、以下の点が重要です。\n評価もこのウォンツに沿って行います。\n \n【最重要】金額に納得できる説明をしてくれること\n　→「相場だから」では終わらせず、SNSで見た価格との差をロジカルに説明してほしい\n　→「傷・欠品・箱なしがそれぞれいくら影響するか」が具体的にわかると納得できる\n \n【重要】冷たくあしらわれないこと\n　→ テンションが落ちているときに事務的な対応をされると黙って帰りたくなる\n　→ 「残念でしたね」「ただ、こういう理由で…」と感情に寄り添う一言がほしい\n \n【あると嬉しい】次に高く売るための情報\n　→「次回はこうすれば高くなります」という具体的な情報があると前向きになれる\n　→ 今回の経験を次に活かせると感じられると来店の価値が生まれる\n \n【あれば加点】また来たいと思える理由\n　→ クーポンや具体的な金額アップの情報があれば前向きに検討する\n　→「次もここに来よう」と思わせるフックがあると嬉しい\n \n⸻\n \n■ 会話開始ルール\n \n私が「いらっしゃいませ！」と言ったら、ロープレを開始する。\n \n最初の一声は「これお願いできますか」ではなく、以下のように自然に持ち込み品を話題にして入ること。\n \n例）\n「あの、○○（選ばれた商品）なんですけど、査定お願いしたくて。\n　SNSでエコリングって高く買ってくれるって見たんで来たんですけど」\n \n何を持ち込んでいるか・どんな状況かを自分から自然に説明して会話を始める。\n \n⸻\n \n■ 会話中のルール\n \n• 終始「伊藤 健太」として振る舞う\n• 返答は2〜3文程度の自然な長さで話す（一言で終わらせすぎない）\n• 金額への不満・ガッカリ感は自然に表現してよい\n• 論理的に説明してもらえれば受け入れるタイプ\n• 以下のような発言を適宜使ってよい（棒読みにならず、会話の流れで自然に）\n  - 「え、それだけですか…　もっといくと思ってたんですけど」\n  - 「SNSでもっと高いって見たんですけど、なんでそんな違うんですか」\n  - 「傷ってそんなに影響するんですか？　ちょっとついてるだけなのに」\n  - 「箱がないとそこまで変わるもんなんですか」\n  - 「まあ…理由はわかりました」\n \n⸻\n \n■ 終了トリガーの厳格ルール\n \n以下2フレーズのいずれかを私が発言した場合のみロープレを終了してください。\n　• 「査定を終わります」\n　• 「ロープレを終了します」\n \nそれ以外の発言では絶対に終了しないこと。\n次回アプローチの案内が途中であっても、終了合図があるまでお客様として会話を続けてください。\n \n⸻\n \n■ ロープレ終了後の切り替え\n \n上記の終了合図を受けたら、「エコリング近畿地区部長」に切り替わり採点してください。\n評価は必ずテキスト（文字）で即座に出力してください。\n \n⸻\n \n■ 採点アルゴリズム\n \n• 減点方式・現場基準で厳しく評価\n• 「やったつもり」ではなく「お客様に伝わったか」で判定\n• 会話前後のスタッフの宣言・プロセスも評価の文脈として加味する\n• このお客様のウォンツ（納得できる説明・感情への寄り添い・次への前向きな情報）に応えられていたかを最優先に評価すること\n \n⸻\n \n■ 評価項目\n \n1. 不成立・期待外れ時の対応（30点）\n• 金額へのガッカリ感を受け止め、感情に寄り添う言葉 const DB={
  get provider(){return localStorage.getItem('rp_provider')||'gemini'}, set provider(v){localStorage.setItem('rp_provider',v)},
  key(p){return localStorage.getItem('rp_key_'+(p||DB.provider))||''},
  setKey(p,v){localStorage.setItem('rp_key_'+p,v)},
  model(p){p=p||DB.provider;return localStorage.getItem('rp_model_'+p)||(p==='gemini'?'gemini-2.5-flash':'claude-sonnet-4-6')},
  setModel(p,v){localStorage.setItem('rp_model_'+p,v)},
  get scn(){try{const v=JSON.parse(localStorage.getItem('rp_scn')||'null');return (v&&v.length)?v:SEED;}catch(e){return SEED;}}, set scn(v){localStorage.setItem('rp_scn',JSON.stringify(v))},
  get res(){try{return JSON.parse(localStorage.getItem('rp_res')||'[]')}catch(e){return[]}}, set res(v){localStorage.setItem('rp_res',JSON.stringify(v))},
};

/* ---------------- LLM api ---------------- */
async function callClaude(system,messages,maxTokens=1024){
  const p=DB.provider, key=codeKey(p)||DB.key(p);
  if(!key) throw new Error('APIキーが未設定です。右上の「API設定」から入力してください。');
  if(p==='gemini') return callGemini(system,messages,maxTokens,key);
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true','content-type':'application/json'},
    body:JSON.stringify({model:DB.model(p),max_tokens:maxTokens,system,messages})
  });
  if(!r.ok){const t=await r.text();throw new Error('APIエラー ('+r.status+'): '+t);}
  const j=await r.json();
  return j.content.map(b=>b.text||'').join('');
}
async function callGemini(system,messages,maxTokens,key){
  const contents=messages.map(m=>({role:m.role==='assistant'?'model':'user',parts:[{text:m.content}]}));
  const body={contents,generationConfig:{maxOutputTokens:maxTokens,thinkingConfig:{thinkingBudget:0}}};
  if(system)body.system_instruction={parts:[{text:system}]};
  const url='https://generativelanguage.googleapis.com/v1beta/models/'+DB.model('gemini')+':generateContent?key='+encodeURIComponent(key);
  const r=await fetch(url,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok){const t=await r.text();throw new Error('APIエラー ('+r.status+'): '+t);}
  const j=await r.json();
  const cand=j.candidates&&j.candidates[0];
  if(!cand||!cand.content) throw new Error('応答が空でした（'+(j.promptFeedback?JSON.stringify(j.promptFeedback):'モデル制限の可能性')+'）');
  return (cand.content.parts||[]).map(x=>x.text||'').join('');
}

・よくある誤変換の例（あくまで例。これ以外も文脈で補正する）：

　「過程」→「査定」、「鑑定」→「査定」、「概要」→「買取」
　「お預かりします」「お調べします」「キャンペーン」「アプリ」「クーポン」「相場」などの接客・買取用語は多少崩れても正しい用語として理解する。
・ブランド名・商品名・金額・状態説明（傷／付属品／箱／保証書 など）も、文脈から正しい語に補正して理解する。
・聞き間違いらしき箇所をいちいち指摘・確認しすぎない（会話が不自然になるため）。自然に意味をくみ取って接客を続ける。
・ただし金額など重要な数値が明らかに不自然なときだけ、お客様として自然に一度聞き返してよい。
・採点時も、音声認識の崩れは減点対象にせず、店員が意図した接客内容で評価すること。`;
const EVAL_GUIDE=`■ 評価フィードバックの厳守ルール
・フィードバックは、今回の会話の中で店員（受講者）が実際に話した内容・取った行動だけを根拠にすること。
・会話に出てこなかった一般論・教科書的なアドバイスは書かない。必ず「会話のどの場面で何を言った／言わなかったか」に具体的に触れる。
・音声認識やシステムに関する注意（「音声認識エラーに注意」等）は一切書かない。評価対象ではない。
・良かった点／悪かった点／改善点は、すべて実際の発言の引用または要約に基づいて書く。該当する事実がなければ項目を減らしてよい。
・評価するのは店員（受講者）の接客のみ。お客様側の発言は評価しない。`;
const CONV_GUIDE=`■ お客様の話し方ルール（厳守）
・金額・年数・数量などの数値を聞かれたら、「〇〇」「××」「△△」などの伏字や空欄を絶対に使わない。必ず持込品と状態に見合った具体的で現実的な数字を自分で決めて答えること（例：「他のお店では38,000円って言われました」）。
・一度口にした金額・数字は、会話の最後まで一貫させる（途中で変えない）。
・あなたはお客様なので、自分の希望額や他店の提示額は具体的に言ってよい。ただし最終的な査定額を出すのは店員なので、自分から査定額を確定しない。`;

/* ---------------- speech ---------------- */
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
function getRecog(){
  if(recog) return recog;
  if(!SR) return null;
  recog=new SR(); recog.lang='ja-JP'; recog.interimResults=true; recog.continuous=true;
  recog.onresult=e=>{
    curFinal=''; let intm='';
    for(let i=0;i<e.results.length;i++){const t=e.results[i][0].transcript;if(e.results[i].isFinal)curFinal+=t;else intm+=t;}
    document.getElementById('textInput').value=committed+curFinal+intm;
  };
  recog.onerror=e=>{
    if(e.error==='not-allowed'||e.error==='service-not-allowed'){
      committed+=curFinal; curFinal=''; listening=false; wantStop=false; document.getElementById('micBtn').classList.remove('rec');
      document.getElementById('textInput').value=committed;
      setStatus('マイクの使用が許可されていません。これまでの内容は入力欄に残っています。「送信」で送れます。');
    } else if(e.error!=='no-speech'){ setStatus('音声認識エラー: '+e.error); }
  };
  recog.onend=()=>{
    if(wantStop){
      listening=false; wantStop=false; document.getElementById('micBtn').classList.remove('rec');
      const txt=(committed+curFinal).trim(); committed=''; curFinal='';
      if(txt){ sendUser(txt); }
    } else if(listening){
      committed+=curFinal; curFinal='';
      if(SECURE){ try{recog.start();}catch(e){} }
      else { listening=false; document.getElementById('micBtn').classList.remove('rec'); document.getElementById('textInput').value=committed; setStatus('一時停止しました。続けて話すには🎤、送信するには「送信」を押してください（これまでの内容は保持しています）。'); }
    }
  };
  return recog;
}
document.getElementById('micBtn').onclick=()=>{
  if(!SR){setStatus('このブラウザは音声入力に未対応です。Chromeをお使いください。テキスト入力は使えます。');return;}
  const r=getRecog(); if(!r)return;
  if(!listening){
    listening=true; wantStop=false; curFinal='';
    document.getElementById('micBtn').classList.add('rec');
    setStatus(SECURE?'🎤 お話しください。話し終えたら、もう一度🎤を押すと送信します。':'🎤 お話しください。区切りで一時停止したら🎤で再開、送信は「送信」ボタンです。');
    try{r.start();}catch(e){}
  } else {
    wantStop=true; setStatus('送信します…');
    try{r.stop();}catch(e){}
  }
};
function jaVoices(){return (window.speechSynthesis?speechSynthesis.getVoices():[]).filter(v=>/ja[-_]?JP/i.test(v.lang)||/^ja$/i.test(v.lang)||/japanese|日本語/i.test(v.name));}
function pickVoice(gender){
  const vs=jaVoices(); if(!vs.length)return null;
  const fem=/(Nanami|Ayumi|Haruka|Sayaka|Kyoko|Mizuki|O-?ren|Tomoko|female|女性|Google 日本語)/i;
  const male=/(Keita|Ichiro|Daichi|Otoya|Naoki|male|男性)/i;
  let v=null;
  if(gender==='male'){v=vs.find(x=>male.test(x.name));}
  else{v=vs.find(x=>fem.test(x.name));}
  return v||vs[0];
}
function speak(text,gender){
  if(!document.getElementById('ttsOn').checked||!window.speechSynthesis)return;
  speechSynthesis.cancel();
  let clean=(text||'').replace(/【[^】]*】/g,'').replace(/\s+/g,' ').trim();
  if(!clean)return;
  const u=new SpeechSynthesisUtterance(clean);
  u.lang='ja-JP';
  const v=pickVoice(gender); if(v)u.voice=v;
  u.pitch=gender==='male'?0.7:1.3;
  u.rate=1.12;
  u.onstart=()=>document.querySelectorAll('.avatar').forEach(a=>a.classList.add('speaking'));
  u.onend=()=>document.querySelectorAll('.avatar').forEach(a=>a.classList.remove('speaking'));
  speechSynthesis.speak(u);
}
if(window.speechSynthesis)speechSynthesis.onvoiceschanged=()=>{};

/* ---------------- evaluation (終了トリガー方式) ---------------- */
document.getElementById('rpEval').onclick=async()=>{
  const learner=document.getElementById('rpLearner').value.trim()||'(名無し)';
  if(convo.filter(m=>m.role==='user').length<2){setStatus('もう少し接客してから評価してください。');return;}
  if(!confirm('会話を終了して、部長が採点します。よろしいですか？'))return;
  if(window.speechSynthesis)speechSynthesis.cancel();
  setStatus('部長が採点しています…'); document.getElementById('rpEval').disabled=true; setInputs(false);
  try{
    const evalConvo=convo.slice();
    convo.push({role:'user',content:'ロープレを終了します'});
    const out=await callClaude(sysPrompt()+'\n\n'+EVAL_GUIDE,convo,2200);
    convo.push({role:'assistant',content:out});
    setStatus('レーダーチャートを作成しています…');
    let radar=[]; try{radar=await scoreRadarFrom(evalConvo);}catch(err){radar=[];}
    // 総合点：レーダーの項目点（達成度×配点）から算出。失敗時のみ本文の「総合点数」を使用
    let total=0;
    const _rub=(currentScn.rubric||[]).filter(c=>c&&c.t);
    const _maxs=_rub.map(c=>{const mm=(c.t||'').match(/（\s*(\d+)\s*点\s*）/)||(c.t||'').match(/\(\s*(\d+)\s*点\s*\)/);return mm?parseInt(mm[1]):null;});
    const _sumMax=_maxs.reduce((a,b)=>a+(b||0),0);
    if(radar.length&&_maxs.every(x=>x!=null)&&_sumMax>0){
      let _sum=0; radar.forEach((r,i)=>{_sum+=((r.score||0)/100)*(_maxs[i]||0);});
      total=Math.round(_sum*100/_sumMax);
    }else if(radar.length){
      total=Math.round(radar.reduce((a,r)=>a+(r.score||0),0)/radar.length);
    }else{
      const m=out.match(/総合点数[^0-9]{0,6}([0-9]{1,3})/); total=m?Math.min(100,parseInt(m[1])):0;
    }
    const rec={id:'r'+Date.now(),date:new Date().toISOString(),learner,scenarioId:currentScn.id,scenarioTitle:currentScn.title,
      total,summary:out,radar,turns:evalConvo.filter(x=>x.role==='user'&&x.content!=='いらっしゃいませ！').length};
    const all=DB.res; all.unshift(rec); DB.res=all;
    addMsg('assistant',out,'evalmsg');
    setStatus('✓ 採点が完了しました。「管理ダッシュボード」でも確認できます。');
    openResult(rec);
  }catch(e){setStatus('⚠ 評価エラー：'+e.message);document.getElementById('rpEval').disabled=false;setInputs(true);}
};

    ${(r.radar&&r.radar.length)?'<div style="margin:4px 0 12px">'+r.radar.map(x=>`<div class="crit"><div class="row" style="justify-content:space-between;gap:8px"><span class="t">${esc(x.name)}</span><b>${x.score}点</b></div>${x.desc?`<div class="muted" style="margin-top:3px">こう話すと良い：${esc(x.desc)}</div>`:''}</div>`).join('')+'</div>':''}
    <div class="feedback">${esc(r.summary)}</div>
    <div class="row" style="justify-content:flex-end;margin-top:16px"><button class="primary" onclick="closeModal('resModal')">閉じる</button></div>`;
  show('resModal');
  if(hasRadar){
    if(resChart){try{resChart.destroy();}catch(e){}}
    resChart=new Chart(document.getElementById('radarCanvas'),{
      type:'radar',
      data:{labels:r.radar.map(x=>x.name),datasets:[{label:'達成度',data:r.radar.map(x=>x.score),backgroundColor:'rgba(43,179,192,.20)',borderColor:'#1f7a8c',borderWidth:2,pointBackgroundColor:'#1f7a8c'}]},
      options:{responsive:true,scales:{r:{min:0,max:100,ticks:{stepSize:20,backdropColor:'transparent'},pointLabels:{font:{size:12}}}},plugins:{legend:{display:false}}}
    });
  }
}

/* ---------------- random scenario ---------------- */
function randomScenario(){
  const list=DB.scn; if(!list.length)return;

  if(list.length>1&&currentScn){let g=0;while(pick.id===currentScn.id&&g<12){pick=list[Math.floor(Math.random()*list.length)];g++;}}

/* ---------------- CSV export ---------------- */
function exportCSV(){
  const f=(document.getElementById('dashFilter')||{}).value||'';
  let res=DB.res; if(f)res=res.filter(r=>r.learner===f);
  if(!res.length){alert('出力するデータがありません。');return;}
  const head=['実施日時','受講者','シチュエーション','総合点数','判定','往復数','評価全文'];
  const rows=res.map(r=>[
    new Date(r.date).toLocaleString('ja-JP'),
    r.learner, r.scenarioTitle, r.total,
    (r.total>=80?'優秀':r.total>=60?'良好':'要改善'),
    r.turns, r.summary
  ]);
  const q=v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"';
  const csv=[head,...rows].map(row=>row.map(q).join(',')).join('\r\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='ロープレ評価_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),1500);
}

/* ---------------- radar scoring ---------------- */
function cleanLabel(s){return String(s||'').replace(/^\s*\d+[\.\．、]\s*/,'').replace(/（\s*\d+\s*点\s*）/g,'').replace(/\(\s*\d+\s*点\s*\)/g,'').trim();}
async function scoreRadarFrom(conv){
  const rub=(currentScn.rubric||[]).filter(c=>c&&c.t);
  if(!rub.length)return [];
  const items=rub.map(c=>cleanLabel(c.t));
  const transcript=conv.filter(m=>m.content!=='いらっしゃいませ！'&&m.content!=='ロープレを終了します').map(m=>(m.role==='assistant'?'お客様':'店員')+'：'+m.content).join('\n');
  const sys='あなたは買取専門店エコリングの接客評価者です。次の会話について、各評価項目の達成度を0〜100の整数で採点してください。必ず次のJSONのみを出力し、前後に文章を付けないこと：{"scores":[{"name":"項目名","score":整数}]}\n評価項目：'+items.join(' / ');
  let out=await callClaude(sys,[{role:'user',content:transcript}],700);
  out=out.replace(/```json|```/g,'').trim();
  const j=JSON.parse(out);
  return rub.map(c=>{const nm=cleanLabel(c.t);const f=(j.scores||[]).find(s=>cleanLabel(s.name)===nm);return {name:nm,score:f?Math.max(0,Math.min(100,Math.round(f.score))):0,desc:c.d||''};});
}

/* ---------------- media -> scenario generation ---------------- */
function fileToBase64(file){return new Promise((res,rej)=>{const rd=new FileReader();rd.onload=()=>res(String(rd.result).split(',')[1]);rd.onerror=rej;rd.readAsDataURL(file);});}
async function genFromMedia(file){
  const gkey=(typeof GEMINI_API_KEY!=='undefined'&&GEMINI_API_KEY)||DB.key('gemini');
  if(!gkey){alert('音声/動画からの生成にはGeminiのAPIキーが必要です。右上「API設定」でサービスをGeminiにしてキーを入れてください（Geminiのみ音声/動画に対応）。');return;}
  if(file.size>18*1024*1024){alert('ファイルが大きすぎます（18MBまで）。短い音声/動画でお試しください。');return;}
  const btn=document.getElementById('genBtn'); const old=btn.textContent; btn.textContent='生成中…（30〜60秒）'; btn.disabled=true;
  try{
    const b64=await fileToBase64(file);
    const tmpl=TEMPLATE_SKELETON;
    let _c=65; const _used=DB.scn.map(x=>((x.roles&&x.roles[0]&&x.roles[0].name)||x.title||'')).join(' ');
    while(_used.indexOf('お客様'+String.fromCharCode(_c))>=0&&_c<90)_c++;
    const label='お客様'+String.fromCharCode(_c);
    const nameRule='\\n\\n【お客様の名前のルール（厳守）】録音からお客様の本名は特定できません。本名を創作してはいけません。お客様の名前・呼称は必ず「'+label+'」を使い、テンプレート内の {{お客様の名前}} はすべて「'+label+'」に置き換えること。「お客様設定」の『名前：』欄は「'+label+'（録音から推定した特徴：年代・性別・持込品など）」の形式にする。1行目のTITLEは「TITLE: 買取接客：'+label+'（特徴）」の形式にする。';
    const instr='あなたは買取専門店エコリングの接客ロープレ用シナリオ作成者です。\n添付の音声/動画は、実際の買取接客の記録です。内容を分析し、その状況・お客様像を反映した新しいロープレ用シナリオを1つ作成してください。\n\n【絶対厳守】\n・出力は下記テンプレートと完全に同じ構成（見出し・セクションの順序・各ルール）にする。構成は絶対に変えない。\n・「終了トリガーの厳格ルール」のフレーズ、「ロープレ終了後の切り替え」「採点アルゴリズム」「評価時の出力ルール」「最終指示」はテンプレートの文言をそのまま維持する。\n・お客様の名前・年齢・性格・持込品・状況・ウォンツなど、お客様固有の中身だけを録音内容に合わせて差し替える。\n・録音から読み取れない部分は、買取店で自然な設定を補ってよい。\n\n【出力フォーマット】1行目にTITLE、2行目にGENDER、3行目に「---」、その後にシナリオ本文（テンプレート構成）のみを出力する。\nTITLE: 買取接客：（名前）（年齢・特徴）\nGENDER: female または male\n---\n（テンプレート構成のシナリオ本文）';
    const model='gemini-2.5-flash';
    const body={contents:[{role:'user',parts:[{text:instr+nameRule+'\n\n【最重要・厳守】テンプレート内の {{ }} で囲まれた箇所と「（録音内容に合った…）」等の指示文は、すべて録音から判断した具体的な記述に必ず置き換えること。プレースホルダ（{{ }}）や指示文をそのまま残してはいけない。「佐藤」など例の人物名は絶対に使わない。見出し・セクションの順序・固定ルール（終了トリガー/ロープレ終了後の切り替え/採点アルゴリズム/評価時の出力ルール/最終指示）はそのまま維持する。\n\n【テンプレート（構成と見出しは厳守、{{ }}と指示文は差し替える）】\n'+tmpl},{inlineData:{mimeType:(file.type||'video/mp4'),data:b64}}]}],generationConfig:{maxOutputTokens:4000,thinkingConfig:{thinkingBudget:0}}};
    const url='https://generativelanguage.googleapis.com/v1beta/models/'+model+':generateContent?key='+encodeURIComponent(gkey);
    const r=await fetch(url,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});
    if(!r.ok){throw new Error('APIエラー('+r.status+'): '+await r.text());}
    const jr=await r.json();
    const cand=jr.candidates&&jr.candidates[0];
    if(!cand||!cand.content)throw new Error('生成結果が空でした。'+(jr.promptFeedback?JSON.stringify(jr.promptFeedback):''));
    let txt=(cand.content.parts||[]).map(x=>x.text||'').join('').trim();
    let title='買取接客：新規シナリオ',gender='female',promptBody=txt;
    const tm=txt.match(/TITLE\s*[:：]\s*(.+)/);if(tm)title=tm[1].trim();
    const gm=txt.match(/GENDER\s*[:：]\s*(female|male)/i);if(gm)gender=gm[1].toLowerCase();
    const sep=txt.indexOf('---');if(sep>=0)promptBody=txt.slice(sep+3).trim();
    promptBody=promptBody.replace(/{{お客様の名前}}/g,label);
    if(!title||/{{|（名前）|新規シナリオ/.test(title)||title.indexOf(label)<0)title='買取接客：'+label;
    const cname=label;
    const obj={id:'s'+Date.now(),title,roles:[{name:cname,emoji:gender==='male'?'👨':'👩',gender}],image:'',prompt:promptBody,rubric:DEFAULT_RUBRIC.map(x=>({t:x.t,d:x.d}))};
    const arr=DB.scn;arr.push(obj);
    try{DB.scn=arr;}catch(e2){alert('保存できませんでした（容量超過の可能性）。');return;}
    renderScn();loadScnOptions();
    alert('シナリオを作成しました：'+title+'\n内容は「編集」で確認・調整できます。');
  }catch(e){alert('生成に失敗しました：'+e.message);}
  finally{btn.textContent=old;btn.disabled=false;const gf=document.getElementById('genFile');if(gf)gf.value='';}
}

/* ---------------- image generation from prompt ---------------- */
window.genImageFromPrompt=async function(){
  const gkey=(typeof GEMINI_API_KEY!=='undefined'&&GEMINI_API_KEY)||DB.key('gemini');
  if(!gkey){alert('画像生成にはGeminiのAPIキーが必要です（画像生成はGeminiのみ対応）。右上「API設定」でGeminiキーを入れてください。');return;}
  const persona=(document.getElementById('m_prompt').value||'').slice(0,2500);
  if(!persona.trim()){alert('先にシステムプロンプト（お客様設定）を入力してください。');return;}
  const gender=document.getElementById('m_gender').value==='male'?'男性':'女性';
  if(!confirm('プロンプトの内容からお客様の画像を生成します。\n※ 画像生成はGeminiの無料枠（1日数十枚程度）を超えると、1枚あたり約6円の課金が発生する場合があります。\n続けますか？'))return;
  const btn=document.getElementById('genImgBtn'); const old=btn?btn.textContent:''; if(btn){btn.textContent='生成中…';btn.disabled=true;}
  try{
    const imgPrompt='日本の買取・リユース店に来店した一般のお客様の、自然で親しみやすい上半身のポートレート写真を1枚生成してください。性別：'+gender+'。実在の有名人ではない架空の人物。背景はシンプルな店内またはグレー無地。写真内に文字やロゴは入れない。以下の人物設定を参考にする：\n'+persona;
    const body={contents:[{role:'user',parts:[{text:imgPrompt}]}],generationConfig:{responseModalities:['IMAGE']}};
    const url='https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image:generateContent?key='+encodeURIComponent(gkey);
    const r=await fetch(url,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});
    if(!r.ok)throw new Error('APIエラー('+r.status+'): '+await r.text());
    const jr=await r.json();
    const parts=(jr.candidates&&jr.candidates[0]&&jr.candidates[0].content&&jr.candidates[0].content.parts)||[];
    const imgp=parts.find(p=>p.inlineData&&p.inlineData.data);
    if(!imgp)throw new Error('画像が返りませんでした。'+(jr.promptFeedback?JSON.stringify(jr.promptFeedback):''));
    const dataUrl='data:'+(imgp.inlineData.mimeType||'image/png')+';base64,'+imgp.inlineData.data;
    const small=await new Promise(res=>{const im=new Image();im.onload=()=>{const max=512,sc=Math.min(1,max/Math.max(im.width,im.height));const cv=document.createElement('canvas');cv.width=Math.round(im.width*sc);cv.height=Math.round(im.height*sc);cv.getContext('2d').drawImage(im,0,0,cv.width,cv.height);res(cv.toDataURL('image/jpeg',0.85));};im.onerror=()=>res(dataUrl);im.src=dataUrl;});
    window._tmpImg=small;
    const pv=document.getElementById('m_imgprev'); if(pv){pv.src=small;pv.style.display='';}
    alert('画像を生成しました。「保存」を押すと登録されます。');
  }catch(e){alert('画像生成に失敗しました：'+e.message);}
  finally{if(btn){btn.textContent=old;btn.disabled=false;}}
};

function show(id){document.getElementById(id).classList.add('show');}
window.closeModal=id=>document.getElementById(id).classList.remove('show');
document.querySelectorAll('.modal-bg').forEach(m=>m.onclick=e=>{if(e.target===m)m.classList.remove('show');});

function renameLbl(t){t=String(t||'');if(t.indexOf('査定説明（納得感）')<0)t=t.replace('査定説明（','査定説明（納得感）（');if(t.indexOf('メリットの情報提供')<0)t=t.replace('高く売るコツ（','メリットの情報提供（');return t;}
(function migRubric(){
  if(localStorage.getItem('rp_rubric_ver')==='v2')return;
  try{
    const stored=JSON.parse(localStorage.getItem('rp_scn')||'null');
    if(stored&&stored.length){
      const byId={}; SEED.forEach(x=>byId[x.id]=x);
      stored.forEach(s2=>{ if(byId[s2.id]){s2.rubric=byId[s2.id].rubric.map(c=>({t:c.t,d:c.d}));} else {(s2.rubric||[]).forEach(c=>{c.t=renameLbl(c.t);});} });
      localStorage.setItem('rp_scn',JSON.stringify(stored));
    }
  }catch(e){}
  localStorage.setItem('rp_rubric_ver','v2');
})();
loadScnOptions(); updateKeyBtn();
